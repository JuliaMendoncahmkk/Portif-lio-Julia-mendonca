<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Página não encontrada</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #fff;
      color: #000;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
    }

    p {
      margin: 10px 0 30px;
      font-size: 1.2rem;
    }

    svg {
      width: 300px;
      max-width: 100%;
    }

    .jaw {
      transform-origin: 540px 300px;
      animation: chew .6s infinite ease-in-out;
    }

    @keyframes chew {
      0%,100%{ transform: rotate(0deg); }
      50%{ transform: rotate(4deg); }
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Ops... a capivara mastigou o fio, sua página não foi encontrada!</p>

  <svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
    <!-- fio -->
    <line x1="100" y1="250" x2="400" y2="250" stroke="#555" stroke-width="6" />
    <line x1="500" y1="250" x2="800" y2="250" stroke="#555" stroke-width="6" />
    <line x1="400" y1="250" x2="500" y2="250" stroke="red" stroke-dasharray="8 6" stroke-width="6" />

    <!-- capivara -->
    <g>
      <!--corpo-->
      <ellipse cx="610" cy="330" rx="150" ry="90" fill="#8b5e3c"/>
      <!--cabeça-->
      <ellipse cx="520" cy="300" rx="75" ry="60" fill="#8b5e3c"/>
      <!--focinho-->
      <ellipse cx="500" cy="315" rx="28" ry="20" fill="#5a3922"/>

      <!--orelhas-->
      <ellipse cx="560" cy="245" rx="12" ry="18" fill="#5a3922"/>
      <ellipse cx="535" cy="250" rx="10" ry="16" fill="#5a3922"/>

      <!-- olho -->
      <circle cx="540" cy="300" r="7" fill="#000"/>
      <circle cx="542" cy="298" r="2" fill="#fff"/>

      <!-- boca/dente com mandíbula animada -->
      <g class="jaw">
        <rect x="506" y="312" width="10" height="8" rx="2" fill="#f4f5f6"/>
        <path d="M515 320 Q 520 328 540 322" stroke="#392518" stroke-width="4" fill="none"/>
      </g>

      <!-- patinhas -->
      <ellipse cx="660" cy="400" rx="26" ry="12" fill="#5a3922"/>
      <ellipse cx="580" cy="400" rx="24" ry="11" fill="#5a3922"/>
    </g>

    <!-- fiozinho na boca -->
    <line x1="480" y1="310" x2="515" y2="318" stroke="#555" stroke-width="5" />
  </svg>
</body>
</html>
